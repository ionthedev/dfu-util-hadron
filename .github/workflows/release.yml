name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.target.id }}
    runs-on: ${{ matrix.target.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: mac-arm64
            runs_on: macos-15
            kind: unix
          - id: mac-x86_64
            runs_on: macos-15-intel
            kind: unix
          - id: linux-x86_64
            runs_on: ubuntu-24.04
            kind: unix
          - id: windows-x86_64
            runs_on: windows-latest
            kind: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make patchelf pkg-config libusb-1.0-0-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config libusb

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            autoconf
            automake
            libtool
            make
            pkgconf
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libusb

      - name: Build (Linux/macOS)
        if: matrix.target.kind == 'unix'
        shell: bash
        run: |
          ./autogen.sh
          ./configure
          make -C src -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Build (Windows)
        if: matrix.target.kind == 'windows'
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure
          make -C src -j"$(nproc)"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/bin
          cp src/dfu-util src/dfu-prefix src/dfu-suffix dist/bin/

          libusb_path="$(ldd src/dfu-util | awk '/libusb-1.0\.so/ {print $3; exit}')"
          if [ -n "${libusb_path}" ] && [ -f "${libusb_path}" ]; then
            cp -L "${libusb_path}" dist/bin/
          else
            echo "Could not find libusb runtime dependency from ldd output."
            ldd src/dfu-util
            exit 1
          fi

          for bin in dist/bin/dfu-util dist/bin/dfu-prefix dist/bin/dfu-suffix; do
            patchelf --set-rpath '$ORIGIN' "${bin}"
          done

          tar -C dist/bin -czf "dist/dfu-util-${GITHUB_REF_NAME}-${{ matrix.target.id }}.tar.gz" .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist/bin
          cp src/dfu-util src/dfu-prefix src/dfu-suffix dist/bin/

          libusb_path="$(otool -L src/dfu-util | awk '/libusb-1.0/ {print $1; exit}')"
          if [ -z "${libusb_path}" ] || [ ! -f "${libusb_path}" ]; then
            echo "Could not find libusb runtime dependency from otool output."
            otool -L src/dfu-util
            exit 1
          fi
          libusb_name="$(basename "${libusb_path}")"
          cp -L "${libusb_path}" "dist/bin/${libusb_name}"

          install_name_tool -id "@executable_path/${libusb_name}" "dist/bin/${libusb_name}"
          for bin in dist/bin/dfu-util dist/bin/dfu-prefix dist/bin/dfu-suffix; do
            install_name_tool -change "${libusb_path}" "@executable_path/${libusb_name}" "${bin}"
          done

          tar -C dist/bin -czf "dist/dfu-util-${GITHUB_REF_NAME}-${{ matrix.target.id }}.tar.gz" .

      - name: Package (Windows)
        if: matrix.target.kind == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p dist/bin
          cp src/dfu-util.exe src/dfu-prefix.exe src/dfu-suffix.exe dist/bin/

          mapfile -t runtime_dlls < <(
            {
              ldd src/dfu-util.exe
              ldd src/dfu-prefix.exe
              ldd src/dfu-suffix.exe
            } | awk '/=> \/mingw64\/bin\/.*\.dll/ {print $3}' | sort -u
          )

          for dll in "${runtime_dlls[@]}"; do
            cp "${dll}" dist/bin/
          done

          tar -C dist/bin -czf "dist/dfu-util-${GITHUB_REF_NAME}-${{ matrix.target.id }}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.id }}
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
