name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.target.id }}
    runs-on: ${{ matrix.target.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: mac-arm64
            runs_on: macos-15
            kind: unix
          - id: mac-x86_64
            runs_on: macos-15-intel
            kind: unix
          - id: linux-x86_64
            runs_on: ubuntu-24.04
            kind: unix
          - id: windows-x86_64
            runs_on: windows-latest
            kind: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make pkg-config libusb-1.0-0-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config libusb

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            autoconf
            automake
            libtool
            make
            pkgconf
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libusb

      - name: Build (Linux/macOS)
        if: matrix.target.kind == 'unix'
        shell: bash
        run: |
          ./autogen.sh
          ./configure
          make -C src -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Build (Windows)
        if: matrix.target.kind == 'windows'
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure
          make -C src -j"$(nproc)"

      - name: Package (Linux/macOS)
        if: matrix.target.kind == 'unix'
        shell: bash
        run: |
          mkdir -p dist/bin
          cp src/dfu-util src/dfu-prefix src/dfu-suffix dist/bin/
          tar -C dist/bin -czf "dist/dfu-util-${GITHUB_REF_NAME}-${{ matrix.target.id }}.tar.gz" .

      - name: Package (Windows)
        if: matrix.target.kind == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p dist/bin
          cp src/dfu-util.exe src/dfu-prefix.exe src/dfu-suffix.exe dist/bin/
          if [ -f /mingw64/bin/libusb-1.0.dll ]; then
            cp /mingw64/bin/libusb-1.0.dll dist/bin/
          fi
          tar -C dist/bin -czf "dist/dfu-util-${GITHUB_REF_NAME}-${{ matrix.target.id }}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.id }}
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
